# Development environment configuration for Codespaces/Remote development
spring:
  application:
    name: spring-boot-kafka-frontend

  kafka:
    bootstrap-servers: localhost:9092
    producer:
      key-serializer: org.apache.kafka.common.serialization.StringSerializer
      value-serializer: org.springframework.kafka.support.serializer.JsonSerializer

  thymeleaf:
    cache: false

server:
  port: 8080
  # Enable forwarded headers for proper redirect handling in Codespaces
  forward-headers-strategy: framework
  # Trust all proxies (safe in Codespaces environment)
  tomcat:
    remoteip:
      remote-ip-header: x-forwarded-for
      protocol-header: x-forwarded-proto

backend:
  api:
    url: http://localhost:8081/api
