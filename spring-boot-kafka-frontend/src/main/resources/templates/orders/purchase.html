<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" th:replace="~{layout/main :: main}">
<body>
<div th:fragment="content">
    <div class="max-w-4xl mx-auto">
        <div class="flex justify-between items-center mb-6">
            <h1 class="text-3xl font-bold text-gray-800">Shopping Cart</h1>
            <a href="/products" class="text-blue-600 hover:text-blue-800">← Continue Shopping</a>
        </div>

        <div th:if="${cartItems.isEmpty()}" class="bg-yellow-100 border border-yellow-400 text-yellow-700 px-4 py-3 rounded mb-4">
            Your cart is empty. <a href="/products" class="font-bold underline">Browse products</a>
        </div>

        <div th:unless="${cartItems.isEmpty()}">
            <div class="bg-white rounded-lg shadow-lg overflow-hidden mb-6">
                <table class="min-w-full">
                    <thead class="bg-gray-200">
                        <tr>
                            <th class="px-6 py-3 text-left text-xs font-medium text-gray-700 uppercase tracking-wider">Product</th>
                            <th class="px-6 py-3 text-left text-xs font-medium text-gray-700 uppercase tracking-wider">Price</th>
                            <th class="px-6 py-3 text-left text-xs font-medium text-gray-700 uppercase tracking-wider">Quantity</th>
                            <th class="px-6 py-3 text-left text-xs font-medium text-gray-700 uppercase tracking-wider">Subtotal</th>
                        </tr>
                    </thead>
                    <tbody class="bg-white divide-y divide-gray-200">
                        <tr th:each="item : ${cartItems}">
                            <td class="px-6 py-4 whitespace-nowrap">
                                <div class="text-sm font-medium text-gray-900" th:text="${item.product.name}">Product Name</div>
                                <div class="text-sm text-gray-500" th:text="${item.product.category}">Category</div>
                            </td>
                            <td class="px-6 py-4 whitespace-nowrap text-sm text-gray-900" th:text="'$' + ${item.product.price}">$10.00</td>
                            <td class="px-6 py-4 whitespace-nowrap text-sm text-gray-900" th:text="${item.quantity}">1</td>
                            <td class="px-6 py-4 whitespace-nowrap text-sm font-medium text-gray-900" th:text="'$' + ${item.subtotal}">$10.00</td>
                        </tr>
                    </tbody>
                </table>
            </div>

            <div class="bg-white rounded-lg shadow-lg p-6">
                <div class="flex justify-between items-center mb-6">
                    <span class="text-xl font-bold text-gray-800">Total:</span>
                    <span class="text-3xl font-bold text-blue-600" th:text="'$' + ${total}">$0.00</span>
                </div>

                <div class="bg-blue-50 border border-blue-200 rounded p-4 mb-6">
                    <p class="text-sm text-blue-800">
                        <strong>Note:</strong> Your order will be processed asynchronously via Kafka.
                        You can view the order status on the Orders page.
                    </p>
                </div>

                <div class="flex space-x-4">
                    <form action="/orders/purchase" method="post" class="flex-1">
                        <button type="submit"
                                class="w-full bg-green-600 hover:bg-green-700 text-white font-bold py-3 px-4 rounded">
                            Place Order (Send to Kafka)
                        </button>
                    </form>
                    <form action="/orders/clear-cart" method="post" class="flex-1">
                        <button type="submit"
                                class="w-full bg-red-600 hover:bg-red-700 text-white font-bold py-3 px-4 rounded"
                                onclick="return confirm('Clear all items from cart?');">
                            Clear Cart
                        </button>
                    </form>
                </div>
            </div>
        </div>
    </div>
</div>
</body>
</html>
