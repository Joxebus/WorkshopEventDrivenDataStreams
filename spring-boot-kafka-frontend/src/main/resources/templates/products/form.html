<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" th:replace="~{layout/main :: main}">
<body>
<div th:fragment="content">
    <script th:src="@{/js/forms.js}"></script>
    <div class="max-w-2xl mx-auto">
        <div class="flex justify-between items-center mb-6">
            <h1 class="text-3xl font-bold text-gray-800" th:text="${isEdit ? 'Edit Product' : 'Create Product'}">Create Product</h1>
            <a href="/products" class="text-blue-600 hover:text-blue-800">← Back to Products</a>
        </div>

        <div class="bg-white rounded-lg shadow-lg p-8">
            <form th:action="${isEdit ? '/products/' + product.id : '/products'}"
                  th:object="${product}"
                  method="post"
                  class="space-y-6">

                <div th:if="${isEdit}">
                    <label class="block text-gray-700 text-sm font-bold mb-2">Product ID</label>
                    <input type="text"
                           th:value="${product.id}"
                           class="shadow appearance-none border rounded w-full py-2 px-3 text-gray-700 bg-gray-100"
                           disabled>
                </div>

                <div>
                    <label class="block text-gray-700 text-sm font-bold mb-2" for="name">
                        Product Name *
                    </label>
                    <input type="text"
                           id="name"
                           th:field="*{name}"
                           class="shadow appearance-none border rounded w-full py-2 px-3 text-gray-700 focus:outline-none focus:ring-2 focus:ring-blue-500"
                           required>
                </div>

                <div>
                    <label class="block text-gray-700 text-sm font-bold mb-2" for="description">
                        Description
                    </label>
                    <textarea id="description"
                              th:field="*{description}"
                              rows="4"
                              class="shadow appearance-none border rounded w-full py-2 px-3 text-gray-700 focus:outline-none focus:ring-2 focus:ring-blue-500"></textarea>
                </div>

                <div class="grid grid-cols-2 gap-4">
                    <div>
                        <label class="block text-gray-700 text-sm font-bold mb-2" for="price">
                            Price *
                        </label>
                        <input type="number"
                               id="price"
                               th:field="*{price}"
                               step="0.01"
                               min="0"
                               class="shadow appearance-none border rounded w-full py-2 px-3 text-gray-700 focus:outline-none focus:ring-2 focus:ring-blue-500"
                               required>
                    </div>

                    <div>
                        <label class="block text-gray-700 text-sm font-bold mb-2" for="stock">
                            Stock *
                        </label>
                        <input type="number"
                               id="stock"
                               th:field="*{stock}"
                               min="0"
                               class="shadow appearance-none border rounded w-full py-2 px-3 text-gray-700 focus:outline-none focus:ring-2 focus:ring-blue-500"
                               required>
                    </div>
                </div>

                <div>
                    <label class="block text-gray-700 text-sm font-bold mb-2" for="category">
                        Category
                    </label>
                    <input type="text"
                           id="category"
                           th:field="*{category}"
                           class="shadow appearance-none border rounded w-full py-2 px-3 text-gray-700 focus:outline-none focus:ring-2 focus:ring-blue-500">
                </div>

                <div class="flex space-x-4">
                    <button type="submit"
                            class="flex-1 bg-blue-600 hover:bg-blue-700 text-white font-bold py-2 px-4 rounded focus:outline-none focus:ring-2 focus:ring-blue-500">
                        <span th:text="${isEdit ? 'Update Product' : 'Create Product'}">Create Product</span>
                    </button>
                    <a href="/products"
                       class="flex-1 text-center bg-gray-400 hover:bg-gray-500 text-white font-bold py-2 px-4 rounded">
                        Cancel
                    </a>
                </div>
            </form>

            <div th:if="${isEdit}" class="mt-6 pt-6 border-t">
                <form th:action="@{/products/{id}/delete(id=${product.id})}" method="post"
                      onsubmit="return confirmDelete('Are you sure you want to delete this product?');">
                    <button type="submit"
                            class="bg-red-600 hover:bg-red-700 text-white font-bold py-2 px-4 rounded">
                        Delete Product
                    </button>
                </form>
            </div>
        </div>
    </div>
</div>
</body>
</html>
