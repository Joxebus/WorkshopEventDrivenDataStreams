<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" th:replace="~{layout/main :: main}">
<body>
<div th:fragment="content">
    <!-- Notification Toast -->
    <div id="notification" class="hidden fixed top-4 right-4 z-50 max-w-sm w-full bg-white shadow-lg rounded-lg pointer-events-auto ring-1 ring-black ring-opacity-5 overflow-hidden">
        <div class="p-4">
            <div class="flex items-start">
                <div class="flex-shrink-0">
                    <svg id="notification-icon-success" class="h-6 w-6 text-green-400 hidden" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 12l2 2 4-4m6 2a9 9 0 11-18 0 9 9 0 0118 0z" />
                    </svg>
                    <svg id="notification-icon-error" class="h-6 w-6 text-red-400 hidden" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M10 14l2-2m0 0l2-2m-2 2l-2-2m2 2l2 2m7-2a9 9 0 11-18 0 9 9 0 0118 0z" />
                    </svg>
                </div>
                <div class="ml-3 w-0 flex-1 pt-0.5">
                    <p id="notification-message" class="text-sm font-medium text-gray-900"></p>
                </div>
                <div class="ml-4 flex-shrink-0 flex">
                    <button onclick="closeNotification()" class="bg-white rounded-md inline-flex text-gray-400 hover:text-gray-500 focus:outline-none">
                        <span class="sr-only">Close</span>
                        <svg class="h-5 w-5" viewBox="0 0 20 20" fill="currentColor">
                            <path fill-rule="evenodd" d="M4.293 4.293a1 1 0 011.414 0L10 8.586l4.293-4.293a1 1 0 111.414 1.414L11.414 10l4.293 4.293a1 1 0 01-1.414 1.414L10 11.414l-4.293 4.293a1 1 0 01-1.414-1.414L8.586 10 4.293 5.707a1 1 0 010-1.414z" clip-rule="evenodd" />
                        </svg>
                    </button>
                </div>
            </div>
        </div>
    </div>

    <div class="flex justify-between items-center mb-6">
        <h1 class="text-3xl font-bold text-gray-800">Products</h1>
        <a href="/products/new" class="bg-blue-600 hover:bg-blue-700 text-white font-bold py-2 px-4 rounded">
            + New Product
        </a>
    </div>

    <!-- Category Filter Section -->
    <div class="mb-6 flex items-center gap-4">
        <label for="categoryFilter" class="text-sm font-semibold text-gray-700">Filter by Category:</label>
        <select id="categoryFilter"
                th:data-page-size="${pageSize}"
                onchange="filterByCategory(this)"
                class="px-4 py-2 border border-gray-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-blue-500">
            <option value="All" th:selected="${selectedCategory == 'All'}">All Categories</option>
            <option th:each="cat : ${categories}"
                    th:value="${cat}"
                    th:text="${cat}"
                    th:selected="${cat == selectedCategory}">
                Category
            </option>
        </select>
        <span class="text-sm text-gray-600" th:if="${selectedCategory != 'All'}">
            Showing: <span class="font-semibold" th:text="${selectedCategory}"></span>
        </span>
    </div>

    <script th:inline="javascript">
        function filterByCategory(selectElement) {
            var pageSize = selectElement.getAttribute('data-page-size');
            var category = selectElement.value;
            window.location.href = '/products?page=0&size=' + pageSize + '&category=' + category;
        }
    </script>

    <div th:if="${products.isEmpty()}" class="bg-yellow-100 border border-yellow-400 text-yellow-700 px-4 py-3 rounded">
        <span th:if="${selectedCategory == 'All'}">No products available. Create your first product!</span>
        <span th:unless="${selectedCategory == 'All'}">No products found in category: <span th:text="${selectedCategory}"></span></span>
    </div>

    <div th:unless="${products.isEmpty()}">
        <div class="mb-4 text-sm text-gray-600">
            Showing <span class="font-semibold" th:text="${#lists.size(products)}">20</span> of
            <span class="font-semibold" th:text="${totalElements}">100</span> products
            <span th:if="${selectedCategory != 'All'}">
                in category: <span class="font-semibold" th:text="${selectedCategory}"></span>
            </span>
        </div>

        <div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-6">
            <div th:each="product : ${products}" class="bg-white rounded-lg shadow-lg overflow-hidden">
                <div class="p-6">
                    <h3 class="text-xl font-bold text-gray-800 mb-2" th:text="${product.name}">Product Name</h3>
                    <p class="text-gray-600 mb-4" th:text="${product.description}">Description</p>

                    <div class="mb-4">
                        <span class="text-2xl font-bold text-blue-600" th:text="'$' + ${product.price}">$10.00</span>
                    </div>

                    <div class="mb-4">
                        <span class="text-sm text-gray-600">Category: </span>
                        <span class="text-sm font-semibold" th:text="${product.category}">Electronics</span>
                    </div>

                    <div class="mb-4">
                        <span class="text-sm text-gray-600">Stock: </span>
                        <span th:if="${product.stock > 10}" class="text-sm font-semibold text-green-600" th:text="${product.stock}">50</span>
                        <span th:if="${product.stock <= 10 && product.stock > 0}" class="text-sm font-semibold text-yellow-600" th:text="${product.stock}">5</span>
                        <span th:if="${product.stock == 0}" class="text-sm font-semibold text-red-600">Out of Stock</span>
                    </div>

                    <div class="flex space-x-2">
                        <button onclick="addToCart(this)"
                                th:disabled="${product.stock == 0}"
                                th:data-product-id="${product.id}"
                                class="flex-1 bg-green-600 hover:bg-green-700 disabled:bg-gray-400 text-white font-bold py-2 px-4 rounded">
                            Add to Cart
                        </button>
                        <a th:href="@{/products/{id}/edit(id=${product.id})}"
                           class="bg-yellow-600 hover:bg-yellow-700 text-white font-bold py-2 px-4 rounded">
                            Edit
                        </a>
                    </div>
                </div>
            </div>
        </div>

        <!-- Pagination Controls -->
        <div class="mt-8 flex justify-center items-center space-x-2">
            <!-- First Page -->
            <a th:if="${currentPage > 0}"
               th:href="@{/products(page=0, size=${pageSize}, category=${selectedCategory != 'All' ? selectedCategory : null})}"
               class="px-3 py-2 bg-white border border-gray-300 rounded hover:bg-gray-100">
                &laquo; First
            </a>

            <!-- Previous Page -->
            <a th:if="${currentPage > 0}"
               th:href="@{/products(page=${currentPage - 1}, size=${pageSize}, category=${selectedCategory != 'All' ? selectedCategory : null})}"
               class="px-3 py-2 bg-white border border-gray-300 rounded hover:bg-gray-100">
                &lsaquo; Previous
            </a>

            <!-- Page Numbers -->
            <span th:each="i : ${#numbers.sequence(0, totalPages - 1)}" th:if="${i >= currentPage - 2 && i <= currentPage + 2}">
                <a th:if="${i != currentPage}"
                   th:href="@{/products(page=${i}, size=${pageSize}, category=${selectedCategory != 'All' ? selectedCategory : null})}"
                   th:text="${i + 1}"
                   class="px-3 py-2 bg-white border border-gray-300 rounded hover:bg-gray-100">
                    1
                </a>
                <span th:if="${i == currentPage}"
                      th:text="${i + 1}"
                      class="px-3 py-2 bg-blue-600 text-white border border-blue-600 rounded font-semibold">
                    1
                </span>
            </span>

            <!-- Next Page -->
            <a th:if="${currentPage < totalPages - 1}"
               th:href="@{/products(page=${currentPage + 1}, size=${pageSize}, category=${selectedCategory != 'All' ? selectedCategory : null})}"
               class="px-3 py-2 bg-white border border-gray-300 rounded hover:bg-gray-100">
                Next &rsaquo;
            </a>

            <!-- Last Page -->
            <a th:if="${currentPage < totalPages - 1}"
               th:href="@{/products(page=${totalPages - 1}, size=${pageSize}, category=${selectedCategory != 'All' ? selectedCategory : null})}"
               class="px-3 py-2 bg-white border border-gray-300 rounded hover:bg-gray-100">
                Last &raquo;
            </a>
        </div>

        <!-- Page Size Selector -->
        <div class="mt-4 flex justify-center items-center space-x-2">
            <span class="text-sm text-gray-600">Items per page:</span>
            <select th:data-category="${selectedCategory}"
                    onchange="changePageSize(this)"
                    class="px-3 py-1 border border-gray-300 rounded">
                <option th:value="10" th:selected="${pageSize == 10}">10</option>
                <option th:value="20" th:selected="${pageSize == 20}">20</option>
                <option th:value="50" th:selected="${pageSize == 50}">50</option>
                <option th:value="100" th:selected="${pageSize == 100}">100</option>
            </select>
        </div>

        <script th:inline="javascript">
            function changePageSize(selectElement) {
                var category = selectElement.getAttribute('data-category');
                var size = selectElement.value;
                var url = '/products?page=0&size=' + size;
                if (category && category !== 'All') {
                    url += '&category=' + category;
                }
                window.location.href = url;
            }

            function addToCart(button) {
                var productId = button.getAttribute('data-product-id');

                // Disable button and show loading state
                button.disabled = true;
                var originalText = button.textContent;
                button.textContent = 'Adding...';

                // Make AJAX call
                fetch('/products/api/' + productId + '/add-to-cart', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/x-www-form-urlencoded',
                    },
                    body: 'quantity=1'
                })
                .then(function(response) {
                    return response.json();
                })
                .then(function(data) {
                    if (data.success) {
                        showNotification(data.message, 'success');
                        // Update cart count if there's a cart indicator
                        updateCartCount();
                    } else {
                        showNotification(data.message, 'error');
                    }
                })
                .catch(function(error) {
                    showNotification('Error adding product to cart', 'error');
                })
                .finally(function() {
                    // Re-enable button and restore original text
                    button.disabled = false;
                    button.textContent = originalText;
                });
            }

            function showNotification(message, type) {
                var notification = document.getElementById('notification');
                var messageElement = document.getElementById('notification-message');
                var successIcon = document.getElementById('notification-icon-success');
                var errorIcon = document.getElementById('notification-icon-error');

                // Set message
                messageElement.textContent = message;

                // Show appropriate icon
                if (type === 'success') {
                    successIcon.classList.remove('hidden');
                    errorIcon.classList.add('hidden');
                } else {
                    successIcon.classList.add('hidden');
                    errorIcon.classList.remove('hidden');
                }

                // Show notification
                notification.classList.remove('hidden');

                // Auto-hide after 3 seconds
                setTimeout(function() {
                    closeNotification();
                }, 3000);
            }

            function closeNotification() {
                var notification = document.getElementById('notification');
                notification.classList.add('hidden');
            }

            function updateCartCount() {
                // Fetch current cart count and update UI if cart indicator exists
                fetch('/products/api/cart/count')
                    .then(function(response) {
                        return response.json();
                    })
                    .then(function(data) {
                        // If there's a cart count element in the layout, update it
                        var cartCountElement = document.getElementById('cart-count');
                        if (cartCountElement) {
                            cartCountElement.textContent = data.count;
                        }
                    })
                    .catch(function(error) {
                        console.error('Error updating cart count:', error);
                    });
            }
        </script>
    </div>
</div>
</body>
</html>
